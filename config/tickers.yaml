  tickers:
    - SPY    # S&P 500 ETF
    - QQQ    # Nasdaq 100 ETF
    - AAPL   # Apple
    - MSFT   # Microsoft
    - GOOGL  # Alphabet
    - AMZN   # Amazon
    - JPM    # JPMorgan Chase
    - V      # Visa
    - JNJ    # Johnson & Johnson
    - XLF    # Financial Sector ETF

high_risk:
  description: "Volatile, momentum-driven picks"
  tickers:
    - TSLA   # Tesla
    - NVDA   # NVIDIA
    - AMD    # AMD
    - COIN   # Coinbase
    - MARA   # Marathon Digital
    - PLTR   # Palantir
    - SOFI   # SoFi Technologies
    - IWM    # Russell 2000 ETF (small-cap proxy)
